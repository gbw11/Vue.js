<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="app">
  <h1>{{message}}</h1>
  <button @click="count++">
    Count is : {{count}}
  </button>
  </div>
  <!-- vue 사용 방법 1. npm 명령어로 프레임워크 설치 2. CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    // 1. 구조분해할당
    // vue에서 필요한 함수들을 '구조분해할당'으로 가져옴
    // createApp : vue앱을 생성하는 함수
    // ref : 반응형 변수
    const {createApp, ref} = Vue

    // 2. createApp 함수
    const app = createApp ({
      setup() {
        const message = ref('Hello Vue!')
        const count = ref(0)
        
        return{
          message,
          count,
        }

      }


    })
    
    // 3. mount
    app.mount('#app')


  </script>

</body>

</html>
